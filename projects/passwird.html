<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码生成器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #0f0f13; color: #e8e8ed; min-height: 100vh; display: flex; justify-content: center; padding: 60px 20px; }
  .container { max-width: 460px; width: 100%; }
  h1 { font-size: 28px; margin-bottom: 32px; text-align: center; }
  .result { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 24px; position: relative; }
  .result .pwd { font-size: 22px; font-family: monospace; letter-spacing: 2px; word-break: break-all; min-height: 32px; }
  .copy-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.1); border: none; color: #a1a1aa; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .copy-btn:hover { background: rgba(255,255,255,0.15); color: #e8e8ed; }
  .setting { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .setting label { font-size: 15px; }
  .setting input[type="checkbox"] { width: 18px; height: 18px; accent-color: #667eea; cursor: pointer; }
  .length-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .length-row label { font-size: 15px; }
  input[type="range"] { flex: 1; accent-color: #667eea; cursor: pointer; }
  .len-val { font-size: 18px; font-weight: 600; color: #667eea; min-width: 28px; text-align: center; }
  .gen-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 24px; transition: 0.2s; }
  .gen-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .strength { text-align: center; margin-top: 16px; font-size: 14px; }
  .strength .bar { height: 4px; border-radius: 2px; margin-top: 6px; transition: 0.3s; }
</style>
</head>
<body>
<div class="container">
  <h1>密码生成器</h1>
  <div class="result">
    <div class="pwd" id="pwd">点击下方按钮生成</div>
    <button class="copy-btn" onclick="copyPwd()">复制</button>
  </div>
  <div class="length-row">
    <label>密码长度</label>
    <input type="range" id="len" min="6" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value">
    <span class="len-val" id="lenVal">16</span>
  </div>
  <div class="setting"><label>大写字母 (A-Z)</label><input type="checkbox" id="upper" checked></div>
  <div class="setting"><label>小写字母 (a-z)</label><input type="checkbox" id="lower" checked></div>
  <div class="setting"><label>数字 (0-9)</label><input type="checkbox" id="digits" checked></div>
  <div class="setting"><label>特殊符号 (!@#$...)</label><input type="checkbox" id="symbols" checked></div>
  <button class="gen-btn" onclick="generate()">生成密码</button>
  <div class="strength" id="strength"></div>
</div>
<script>
function generate() {
  const len = +document.getElementById('len').value;
  let chars = '';
  if (document.getElementById('upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (document.getElementById('lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (document.getElementById('digits').checked) chars += '0123456789';
  if (document.getElementById('symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
  if (!chars) { document.getElementById('pwd').textContent = '请至少选择一种字符'; return; }
  let pwd = '';
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  for (let i = 0; i < len; i++) pwd += chars[arr[i] % chars.length];
  document.getElementById('pwd').textContent = pwd;
  showStrength(len, chars.length);
}
function showStrength(len, charsetSize) {
  const entropy = len * Math.log2(charsetSize);
  let label, color, pct;
  if (entropy < 40) { label = '弱'; color = '#e74c3c'; pct = 25; }
  else if (entropy < 60) { label = '中等'; color = '#f39c12'; pct = 50; }
  else if (entropy < 80) { label = '强'; color = '#2ecc71'; pct = 75; }
  else { label = '非常强'; color = '#667eea'; pct = 100; }
  document.getElementById('strength').innerHTML = '密码强度：<b style="color:'+color+'">' + label + '</b><div class="bar" style="background:'+color+';width:'+pct+'%"></div>';
}
function copyPwd() {
  const pwd = document.getElementById('pwd').textContent;
  if (pwd === '点击下方按钮生成' || pwd === '请至少选择一种字符') return;
  navigator.clipboard.writeText(pwd).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}
generate();
</script>
</body>
</html>
