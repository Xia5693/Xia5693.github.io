<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待办工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #0f0f13; color: #e8e8ed; min-height: 100vh; display: flex; justify-content: center; padding: 60px 20px; }
  .container { max-width: 500px; width: 100%; }
  h1 { font-size: 28px; margin-bottom: 24px; text-align: center; }
  .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
  input[type="text"] { flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #e8e8ed; font-size: 15px; outline: none; }
  input[type="text"]:focus { border-color: #667eea; }
  button { padding: 12px 20px; border-radius: 10px; border: none; background: #667eea; color: white; font-size: 15px; cursor: pointer; transition: 0.2s; }
  button:hover { background: #5a6fd6; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
  .filters button { background: rgba(255,255,255,0.06); color: #a1a1aa; font-size: 13px; padding: 6px 14px; }
  .filters button.active { background: rgba(99,102,241,0.2); color: #667eea; }
  ul { list-style: none; }
  li { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; margin-bottom: 8px; transition: 0.2s; }
  li:hover { border-color: rgba(255,255,255,0.12); }
  li.done span { text-decoration: line-through; opacity: 0.5; }
  li span { flex: 1; font-size: 15px; }
  .check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
  .check:hover { border-color: #667eea; }
  li.done .check { background: #667eea; border-color: #667eea; }
  li.done .check::after { content: "\2713"; color: white; font-size: 12px; }
  .del { background: none; border: none; color: #666; cursor: pointer; font-size: 18px; padding: 0 4px; }
  .del:hover { color: #e74c3c; }
  .empty { text-align: center; color: #555; padding: 40px; font-size: 14px; }
  .count { text-align: center; color: #666; font-size: 13px; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">
  <h1>待办工具</h1>
  <div class="input-row">
    <input type="text" id="input" placeholder="添加新任务...">
    <button onclick="add()">添加</button>
  </div>
  <div class="filters">
    <button class="active" onclick="setFilter('all',this)">全部</button>
    <button onclick="setFilter('active',this)">未完成</button>
    <button onclick="setFilter('done',this)">已完成</button>
  </div>
  <ul id="list"></ul>
  <div class="count" id="count"></div>
</div>
<script>
let todos = JSON.parse(localStorage.getItem('todos') || '[]');
let filter = 'all';
const input = document.getElementById('input');
input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
function save() { localStorage.setItem('todos', JSON.stringify(todos)); render(); }
function add() {
  const text = input.value.trim();
  if (!text) return;
  todos.push({ text, done: false });
  input.value = '';
  save();
}
function toggle(i) { todos[i].done = !todos[i].done; save(); }
function del(i) { todos.splice(i, 1); save(); }
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function render() {
  const list = document.getElementById('list');
  const filtered = todos.filter(t => filter === 'all' || (filter === 'done' ? t.done : !t.done));
  if (filtered.length === 0) { list.innerHTML = '<div class="empty">暂无任务</div>'; }
  else {
    list.innerHTML = filtered.map(t => {
      const ri = todos.indexOf(t);
      return '<li class="' + (t.done ? 'done' : '') + '"><div class="check" onclick="toggle(' + ri + ')"></div><span>' + t.text + '</span><button class="del" onclick="del(' + ri + ')">×</button></li>';
    }).join('');
  }
  const done = todos.filter(t => t.done).length;
  document.getElementById('count').textContent = todos.length ? '共 ' + todos.length + ' 项，已完成 ' + done + ' 项' : '';
}
render();
</script>
</body>
</html>
