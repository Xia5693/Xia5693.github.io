<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夏宇乐 - 个人名片</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8ed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 24px 24px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -15%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(236,72,153,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Navigation ── */
  nav {
    position: relative;
    z-index: 10;
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  nav a {
    color: #a1a1aa;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: 999px;
    border: 1px solid transparent;
    transition: all 0.2s ease;
  }
  nav a:hover {
    color: #e8e8ed;
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.08);
  }
  nav a.active {
    color: #f4f4f5;
    background: rgba(99,102,241,0.15);
    border-color: rgba(99,102,241,0.25);
  }

  /* ── Main area ── */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .card {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 48px 40px 40px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
    animation: fadeUp 0.6s ease-out both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Avatar */
  .avatar {
    width: 110px; height: 110px;
    border-radius: 50%;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 42px; font-weight: 700; color: #fff;
    letter-spacing: -1px;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.25), 0 4px 16px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }
  .avatar img {
    width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
  }

  .name {
    font-size: 26px;
    font-weight: 700;
    color: #f4f4f5;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .tagline {
    font-size: 14px;
    color: #a1a1aa;
    margin-bottom: 28px;
    font-weight: 400;
  }

  /* Skills */
  .skills {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 32px;
  }

  .skill-tag {
    background: rgba(99,102,241,0.12);
    color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.2);
    padding: 6px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s ease;
    cursor: default;
  }
  .skill-tag:hover {
    background: rgba(99,102,241,0.22);
    border-color: rgba(99,102,241,0.4);
    transform: translateY(-1px);
  }

  /* Social links */
  .social-links {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .social-link {
    display: flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: #a1a1aa;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .social-link:hover {
    background: rgba(255,255,255,0.1);
    color: #e8e8ed;
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }
  .social-link svg {
    width: 20px; height: 20px;
  }

  /* Welcome button */
  .welcome-btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: inherit;
    letter-spacing: -0.2px;
    box-shadow: 0 4px 12px rgba(99,102,241,0.3);
  }
  .welcome-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(99,102,241,0.45);
  }
  .welcome-btn:active {
    transform: translateY(0);
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden;
    transition: all 0.3s ease;
    z-index: 100;
    padding: 24px;
  }
  .modal-overlay.active {
    opacity: 1; visibility: visible;
  }

  .modal {
    background: #1a1a24;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 36px 32px 28px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    transform: scale(0.9) translateY(12px);
    transition: transform 0.3s ease;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .modal-overlay.active .modal {
    transform: scale(1) translateY(0);
  }

  .modal-icon {
    font-size: 40px;
    margin-bottom: 16px;
  }

  .modal h2 {
    font-size: 20px;
    color: #f4f4f5;
    margin-bottom: 10px;
    font-weight: 700;
  }

  .modal p {
    font-size: 14px;
    color: #a1a1aa;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .modal-close {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #d4d4d8;
    padding: 8px 28px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.2s ease;
  }
  .modal-close:hover {
    background: rgba(255,255,255,0.14);
    color: #f4f4f5;
  }

  /* Responsive */
  @media (max-width: 480px) {
    body { padding: 0 16px 16px; }
    .card { padding: 40px 24px 32px; }
    .name { font-size: 22px; }
    .avatar { width: 96px; height: 96px; font-size: 36px; }
    nav { gap: 4px; }
    nav a { padding: 6px 14px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="index.html" class="active">首页</a>
  <a href="projects.html">作品集</a>
  <a href="tools.html">工具箱</a>
</nav>

<div class="main">
  <div class="card">
    <!-- Avatar placeholder: replace src with your own image -->
    <img class="avatar" id="avatar" src="touxiang.jpg" alt="头像">

    <h1 class="name">夏宇乐</h1>
    <p class="tagline">AI爱好者 / 编程小白</p>

    <div class="skills">
      <span class="skill-tag">AI爱好者</span>
      <span class="skill-tag">19143665433@163.com</span>
      <span class="skill-tag">AI与Agent</span>
    </div>

    <div class="social-links">
      <!-- GitHub -->
      <a class="social-link" href="https://github.com/" target="_blank" rel="noopener" title="GitHub">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
          <path d="M9 18c-4.51 2-5-2-7-2"/>
        </svg>
      </a>
      <!-- Feishu / Lark -->
      <a class="social-link" href="https://www.feishu.cn/invitation/page/add_contact/?token=c20r4e91-17a6-488a-a773-f741b002a37a&unique_id=A0w0WTNMPAqqN32pUHdanw==" target="_blank" rel="noopener" title="飞书">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
        </svg>
      </a>
      </div>

    <button class="welcome-btn" id="welcomeBtn">点击查看欢迎语</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon">👋</div>
    <h2>你好，欢迎来到我的主页！</h2>
    <p>我是夏宇乐，一个学习AI的电商学生。感谢你的到访，希望在这里你能找到有趣的东西。</p>
    <button class="modal-close" id="modalClose">知道啦</button>
  </div>
</div>

<script>
  const btn = document.getElementById('welcomeBtn');
  const overlay = document.getElementById('modalOverlay');
  const closeBtn = document.getElementById('modalClose');

  btn.addEventListener('click', () => overlay.classList.add('active'));
  closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') overlay.classList.remove('active');
  });
</script>

</body>
</html>
