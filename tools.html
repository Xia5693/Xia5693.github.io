<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具箱 | 林一</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8ed;
    min-height: 100vh;
    padding: 0 24px 60px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -15%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(236,72,153,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Navigation ── */
  nav {
    position: relative;
    z-index: 10;
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  nav a {
    color: #a1a1aa;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: 999px;
    border: 1px solid transparent;
    transition: all 0.2s ease;
  }
  nav a:hover {
    color: #e8e8ed;
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.08);
  }
  nav a.active {
    color: #f4f4f5;
    background: rgba(99,102,241,0.15);
    border-color: rgba(99,102,241,0.25);
  }

  /* ── Page header ── */
  .page-header {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 8px auto 40px;
    text-align: center;
    animation: fadeUp 0.5s ease-out both;
  }
  .page-header h1 {
    font-size: 30px;
    font-weight: 700;
    color: #f4f4f5;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .page-header p {
    font-size: 14px;
    color: #a1a1aa;
  }

  /* ── Tool grid ── */
  .tool-grid {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }

  /* ── Tool card ── */
  .tool-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 28px 24px 24px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.06);
    animation: fadeUp 0.5s ease-out both;
  }
  .tool-card:nth-child(1) { animation-delay: 0.05s; }
  .tool-card:nth-child(2) { animation-delay: 0.10s; }
  .tool-card:nth-child(3) { animation-delay: 0.15s; grid-column: 1 / -1; }

  .tool-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .tool-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .tool-title {
    font-size: 17px;
    font-weight: 600;
    color: #f4f4f5;
    letter-spacing: -0.2px;
  }

  /* ── Shared button ── */
  .action-btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s ease;
    box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    letter-spacing: -0.2px;
  }
  .action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(99,102,241,0.45);
  }
  .action-btn:active { transform: translateY(0); }

  /* ── Quote tool ── */
  .quote-text {
    font-size: 16px;
    line-height: 1.7;
    color: #d4d4d8;
    font-style: italic;
    margin-bottom: 8px;
    min-height: 54px;
  }
  .quote-author {
    font-size: 13px;
    color: #a1a1aa;
    margin-bottom: 20px;
    text-align: right;
  }

  /* ── Color tool ── */
  .color-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .color-picker {
    -webkit-appearance: none;
    appearance: none;
    width: 52px; height: 52px;
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    cursor: pointer;
    background: none;
    padding: 0;
  }
  .color-picker::-webkit-color-swatch-wrapper { padding: 2px; }
  .color-picker::-webkit-color-swatch { border: none; border-radius: 8px; }
  .color-picker::-moz-color-swatch { border: none; border-radius: 8px; }

  .color-hex {
    font-size: 22px;
    font-weight: 700;
    font-family: 'Consolas', 'Monaco', monospace;
    color: #e8e8ed;
    letter-spacing: 1px;
  }

  .color-preview {
    width: 100%;
    height: 64px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: background-color 0.2s ease;
  }

  /* ── Char counter tool ── */
  .char-textarea {
    width: 100%;
    min-height: 120px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px;
    color: #e8e8ed;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s ease;
    line-height: 1.6;
  }
  .char-textarea::placeholder { color: #52525b; }
  .char-textarea:focus { border-color: rgba(99,102,241,0.4); }

  .char-stats {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    color: #a5b4fc;
    font-variant-numeric: tabular-nums;
  }

  .stat-label {
    font-size: 12px;
    color: #71717a;
    margin-top: 2px;
  }

  /* ── Footer ── */
  .footer {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 48px auto 0;
    text-align: center;
  }
  .back-btn {
    display: inline-block;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    text-decoration: none;
    padding: 12px 32px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.25s ease;
    box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    letter-spacing: -0.2px;
  }
  .back-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(99,102,241,0.45);
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    body { padding: 0 16px 48px; }
    .tool-grid { grid-template-columns: 1fr; }
    .tool-card:nth-child(3) { grid-column: auto; }
    .page-header h1 { font-size: 24px; }
    nav { gap: 4px; }
    nav a { padding: 6px 14px; font-size: 13px; }
    .char-stats { gap: 14px; }
  }
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="index.html">首页</a>
  <a href="projects.html">作品集</a>
  <a href="tools.html" class="active">工具箱</a>
</nav>

<!-- Page Header -->
<div class="page-header">
  <h1>工具箱</h1>
  <p>收集一些小工具，全部在浏览器本地运行</p>
</div>

<!-- Tool Grid -->
<div class="tool-grid">

  <!-- Tool 1: Random Quote -->
  <div class="tool-card">
    <div class="tool-card-header">
      <div class="tool-icon">💬</div>
      <div class="tool-title">随机名言生成器</div>
    </div>
    <div class="quote-text" id="quoteText">正在加载名言…</div>
    <div class="quote-author" id="quoteAuthor"></div>
    <button class="action-btn" id="quoteBtn">换一句</button>
  </div>

  <!-- Tool 2: Color Picker -->
  <div class="tool-card">
    <div class="tool-card-header">
      <div class="tool-icon">🎨</div>
      <div class="tool-title">颜色选择器</div>
    </div>
    <div class="color-controls">
      <input type="color" class="color-picker" id="colorPicker" value="#6366f1">
      <div class="color-hex" id="colorHex">#6366F1</div>
    </div>
    <div class="color-preview" id="colorPreview" style="background:#6366f1"></div>
  </div>

  <!-- Tool 3: Character Counter -->
  <div class="tool-card">
    <div class="tool-card-header">
      <div class="tool-icon">🔢</div>
      <div class="tool-title">字符计数器</div>
    </div>
    <textarea class="char-textarea" id="charInput" placeholder="在这里输入或粘贴文字…"></textarea>
    <div class="char-stats">
      <div class="stat-item">
        <span class="stat-value" id="totalChars">0</span>
        <span class="stat-label">总字符</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="chineseChars">0</span>
        <span class="stat-label">汉字</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="letterChars">0</span>
        <span class="stat-label">字母</span>
      </div>
    </div>
  </div>

</div>

<!-- Footer -->
<div class="footer">
  <a class="back-btn" href="index.html">← 返回首页</a>
</div>

<script>
  /* ── Quote Tool ── */
  const quotes = [
    { text: '千里之行，始于足下。', author: '老子' },
    { text: '学而不思则罔，思而不学则殆。', author: '孔子' },
    { text: '天行健，君子以自强不息。', author: '《周易》' },
    { text: '路漫漫其修远兮，吾将上下而求索。', author: '屈原' },
    { text: '业精于勤，荒于嬉；行成于思，毁于随。', author: '韩愈' },
    { text: '不积跬步，无以至千里。', author: '荀子' },
    { text: '知之者不如好之者，好之者不如乐之者。', author: '孔子' },
    { text: '书山有路勤为径，学海无涯苦作舟。', author: '韩愈' },
    { text: '纸上得来终觉浅，绝知此事要躬行。', author: '陆游' },
    { text: '生活就像一盒巧克力，你永远不知道下一块是什么味道。', author: '《阿甘正传》' }
  ];

  const quoteText = document.getElementById('quoteText');
  const quoteAuthor = document.getElementById('quoteAuthor');
  const quoteBtn = document.getElementById('quoteBtn');

  function showRandomQuote() {
    const q = quotes[Math.floor(Math.random() * quotes.length)];
    quoteText.textContent = '「' + q.text + '」';
    quoteAuthor.textContent = '— ' + q.author;
  }

  quoteBtn.addEventListener('click', showRandomQuote);
  showRandomQuote();

  /* ── Color Tool ── */
  const colorPicker = document.getElementById('colorPicker');
  const colorHex = document.getElementById('colorHex');
  const colorPreview = document.getElementById('colorPreview');

  colorPicker.addEventListener('input', (e) => {
    const val = e.target.value.toUpperCase();
    colorHex.textContent = val;
    colorPreview.style.backgroundColor = val;
  });

  /* ── Char Counter ── */
  const charInput = document.getElementById('charInput');
  const totalEl = document.getElementById('totalChars');
  const chineseEl = document.getElementById('chineseChars');
  const letterEl = document.getElementById('letterChars');

  charInput.addEventListener('input', () => {
    const val = charInput.value;
    totalEl.textContent = val.length;
    chineseEl.textContent = (val.match(/[\u4e00-\u9fff]/g) || []).length;
    letterEl.textContent = (val.match(/[a-zA-Z]/g) || []).length;
  });
</script>

</body>
</html>
